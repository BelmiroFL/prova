<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Usuário</title>
  <style>
    body { font-family: Arial; max-width: 400px; margin: 50px auto; }
    input, button { width: 100%; padding: 10px; margin: 8px 0; }
    button { background: #007bff; color: white; border: none; cursor: pointer; }
    .msg { padding: 10px; margin-top: 10px; border-radius: 5px; }
    .sucesso { background: #d4edda; color: #155724; }
    .erro { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <h2>Cadastrar Usuário</h2>
  
  <form id="formCadastro">
    <input type="text" id="nome" placeholder="Nome" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="number" id="idade" placeholder="Idade" required>
    <button type="submit">Cadastrar</button>
  </form>

  <div id="mensagem"></div>

  <script>
    document.getElementById('formCadastro').addEventListener('submit', async (e) => {
      e.preventDefault()
      
      const dados = {
        nome: document.getElementById('nome').value,
        email: document.getElementById('email').value,
        idade: document.getElementById('idade').value
      }

      try {
        const resposta = await fetch('http://localhost:3000/usuarios', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(dados)
        })

        const resultado = await resposta.json()
        const divMsg = document.getElementById('mensagem')

        if(resposta.ok) {
          divMsg.className = 'msg sucesso'
          divMsg.textContent = 'Usuário cadastrado com sucesso! ID: ' + resultado.id
          document.getElementById('formCadastro').reset()
        } else {
          divMsg.className = 'msg erro'
          divMsg.textContent = 'Erro: ' + resultado.erro
        }
      } catch (err) {
        document.getElementById('mensagem').className = 'msg erro'
        document.getElementById('mensagem').textContent = 'Erro ao conectar no servidor'
      }
    })
  </script>
</body>
</html>
